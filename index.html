<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petit mot pour mon ti cœur</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }
    body {
  min-height: 100vh;
  background: url('Background.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 700px;
  text-align: center;
}

h1 {
  color: #fff;
  margin-bottom: 20px;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.6);
  font-size: 2rem;
}

.parchment {
  background: #f4e4bc;
  border: 8px solid #c9a86a;
  border-radius: 20px;
  padding: 35px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  position: relative;
}

.parchment::before,
.parchment::after {
  content: "";
  position: absolute;
  width: 30px;
  height: 30px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

.parchment::before {
  top: 10px;
  left: 10px;
}

.parchment::after {
  bottom: 10px;
  right: 10px;
}

input {
  width: 100%;
  padding: 14px;
  border: 2px solid #8b6f47;
  border-radius: 12px;
  font-size: 1rem;
  text-align: center;
  background: rgba(255,255,255,0.7);
  margin-bottom: 20px;
}

.heart-btn {
  background: #d6336c;
  color: white;
  border: none;
  width: 70px;
  height: 70px;
  font-size: 2rem;
  cursor: pointer;
  transform: rotate(-45deg);
  border-radius: 15px;
  position: relative;
  transition: 0.3s;
}

.heart-btn::before,
.heart-btn::after {
  content: "";
  position: absolute;
  width: 70px;
  height: 70px;
  background: #d6336c;
  border-radius: 50%;
}

.heart-btn::before {
  top: -35px;
  left: 0;
}

.heart-btn::after {
  left: 35px;
  top: 0;
}

.heart-btn span {
  position: relative;
  z-index: 2;
  display: inline-block;
  transform: rotate(45deg);
  font-size: 1.5rem;
  margin-top: 8px;
}

.heart-btn:hover {
  transform: rotate(-45deg) scale(1.08);
}

#result {
  margin-top: 30px;
  min-height: 150px;
  color: #3d2b1f;
  font-size: 1.1rem;
  line-height: 1.7;
}

.result-img {
  max-width: 100%;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

iframe {
  width: 100%;
  max-width: 560px;
  height: 315px;
  border: none;
  border-radius: 14px;
  margin-top: 10px;
}

    .magic {
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.glow {
  text-shadow: 0 0 10px #fff, 0 0 20px #ffd700;
}

button {
  margin: 8px;
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  background: #8b6f47;
  color: white;
  cursor: pointer;
  font-size: 1rem;
  transition: 0.3s;
}

button:hover {
  background: #a8885c;
  transform: scale(1.08);
}
    
  </style>
</head>
  <audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<body>
  <div class="container">
    <h1>Petit mot pour mon ti cœur</h1><div class="parchment">
  <input
    type="text"
    id="codeInput"
    placeholder="Entre ton code secret..."
  />

  <button class="heart-btn" onclick="checkCode()">
    <span>❤</span>
  </button>

  <div id="result"></div>
</div>

  </div>  <script>
    const result = document.getElementById("result");

    function typeWriter(text, speed = 45) {
      result.innerHTML = "";
      let i = 0;

      function write() {
        if (i < text.length) {
          result.innerHTML += text.charAt(i);
          i++;
          setTimeout(write, speed);
        }
      }

      write();
    }

    function checkCode() {
      const code = document.getElementById("codeInput").value.trim().toLowerCase();

      if (code === "belle") {
        result.innerHTML = `
          <h2>Carte Lorcana - Belle Étrange</h2>
          <br>
          <img src="tichou1.png"de alt=Carte Lorcana Belle" class="result-img">
        `;
      }

else if (code === "poudlard") {
  startQuiz();
}
        
      else if (code === "sexylove") {
        result.innerHTML = `
          <h2>Ne-Yo - Sexy Love</h2>
          <iframe
            src="https://www.youtube.com/embed/mgaeGW-2z6w"
            allowfullscreen>
          </iframe>
        `;
      }

      else if (code === "moncoeur") {
        typeWriter(
          "Chaque jour avec toi ressemble à une page de plus dans la plus belle des histoires. Merci d'être toi, merci d'être là. Tu es mon plus beau hasard et mon plus doux refuge. ❤"
        );
      }

      else {
        result.innerHTML = "<p>Code inconnu... mais mon cœur reste ouvert pour toi ❤</p>";
      }
    }

let score = {
  gryffondor: 0,
  serpentard: 0,
  serdaigle: 0,
  poufsouffle: 0
};

let questionIndex = 0;

const questions = [
  {
    question: "1. Ce qui te définit le mieux ❤️",
    answers: [
      { text: "Je protège ceux que j'aime", house: "gryffondor" },
      { text: "Je sais ce que je veux et je l'obtiens", house: "serpentard" },
      { text: "J'aime comprendre le monde", house: "serdaigle" },
      { text: "Je suis toujours là pour les autres", house: "poufsouffle" }
    ]
  },
  {
    question: "2. Dans notre histoire...",
    answers: [
      { text: "Tu es mon aventure", house: "gryffondor" },
      { text: "Tu es mon évidence", house: "serdaigle" },
      { text: "Tu es mon désir", house: "serpentard" },
      { text: "Tu es mon cocon", house: "poufsouffle" }
    ]
  },
  {
    question: "3. Ton plus grand pouvoir 💫",
    answers: [
      { text: "Ton courage", house: "gryffondor" },
      { text: "Ta détermination", house: "serpentard" },
      { text: "Ton esprit", house: "serdaigle" },
      { text: "Ton cœur", house: "poufsouffle" }
    ]
  },
  {
    question: "4. Ce que tu es pour moi 🥺",
    answers: [
      { text: "Ma force", house: "gryffondor" },
      { text: "Ma tentation", house: "serpentard" },
      { text: "Ma lumière", house: "serdaigle" },
      { text: "Mon refuge", house: "poufsouffle" }
    ]
  },
  {
    question: "5. Notre futur 💍",
    answers: [
      { text: "Rempli d'aventures", house: "gryffondor" },
      { text: "Intense et passionné", house: "serpentard" },
      { text: "Profond et sincère", house: "serdaigle" },
      { text: "Doux et heureux", house: "poufsouffle" }
    ]
  }
];

function startQuiz() {
  document.getElementById("bgMusic").play();

  score = { gryffondor: 0, serpentard: 0, serdaigle: 0, poufsouffle: 0 };
  questionIndex = 0;

  typeWriter("Le Choixpeau magique s'éveille... 🧙‍♂️✨", 40);

  setTimeout(showQuestion, 2000);
}

function showQuestion() {
  const q = questions[questionIndex];

  result.innerHTML = `<h2 class="magic">${q.question}</h2>`;

  q.answers.forEach(answer => {
    result.innerHTML += `
      <button onclick="selectAnswer('${answer.house}')">
        ${answer.text}
      </button><br>
    `;
  });
}

function selectAnswer(house) {
  score[house]++;
  questionIndex++;

  if (questionIndex < questions.length) {
    showQuestion();
  } else {
    revealHouse();
  }
}

function revealHouse() {
  result.innerHTML = "<h2 class='glow'>Hmmmm... intéressant... 🤔</h2>";

  setTimeout(showResult, 2500);
}

function showResult() {
  let finalHouse = Object.keys(score).reduce((a, b) =>
    score[a] > score[b] ? a : b
  );

  let message = "";

  if (finalHouse === "gryffondor") {
    message = "Gryffondor 🦁\n\nTu es courageuse, intense... et tu fais battre mon cœur plus fort chaque jour. Je suis fier de t'aimer ❤";
  }

  if (finalHouse === "serpentard") {
    message = "Serpentard 🐍\n\nTu es magnétique, irrésistible... et je suis totalement à toi. Impossible de te résister 😏❤";
  }

  if (finalHouse === "serdaigle") {
    message = "Serdaigle 🦅\n\nTon esprit me fascine, ton regard me captive... je tombe amoureux de toi encore et encore ❤";
  }

  if (finalHouse === "poufsouffle") {
    message = "Poufsouffle 🦡\n\nTu es douceur, chaleur... avec toi je suis chez moi. Tu es tout ce dont j’ai besoin ❤";
  }

  typeWriter("Le Choixpeau a parlé...\n\n" + message, 35);
}
    
  </script></body>
</html>
