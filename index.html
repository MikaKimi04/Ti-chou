<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petit mot pour mon ti cœur</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background: url('Background.jpg') center/cover no-repeat fixed;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 110px 20px 40px;
      overflow-x: hidden;
      position: relative;
      color: white;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(255, 105, 180, 0.35), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 215, 0, 0.22), transparent 35%),
        rgba(0, 0, 0, 0.45);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 45px 45px;
      z-index: 0;
      opacity: 0.35;
      pointer-events: none;
    }

    /* ========================= */
    /* NAVBAR STYLÉE */
    /* ========================= */

    .navbar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 1050px;
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(30, 10, 22, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow:
        0 20px 45px rgba(0, 0, 0, 0.35),
        inset 0 0 25px rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 1000;
      animation: navDrop 1s ease forwards;
    }

    @keyframes navDrop {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-25px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .navbar a {
      color: #fff7fb;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      padding: 10px 18px;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      transition: 0.35s ease;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
    }

    .navbar a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(214, 51, 108, 0.85), rgba(255, 215, 0, 0.35));
      opacity: 0;
      transition: 0.35s ease;
      z-index: -1;
    }

    .navbar a:hover {
      transform: translateY(-3px) scale(1.05);
      color: white;
      box-shadow: 0 8px 25px rgba(214, 51, 108, 0.45);
    }

    .navbar a:hover::before {
      opacity: 1;
    }

    .navbar a.active {
      background: linear-gradient(135deg, #d6336c, #ff8fab);
      box-shadow: 0 0 25px rgba(214, 51, 108, 0.7);
    }

    /* ========================= */
    /* EFFETS DÉCORATIFS */
    /* ========================= */

    .floating-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .floating-hearts span {
      position: absolute;
      bottom: -80px;
      color: rgba(255, 160, 190, 0.65);
      font-size: 22px;
      animation: floatHeart linear infinite;
      text-shadow: 0 0 15px rgba(255, 100, 160, 0.8);
    }

    .floating-hearts span:nth-child(1) { left: 8%; animation-duration: 12s; animation-delay: 0s; }
    .floating-hearts span:nth-child(2) { left: 18%; animation-duration: 16s; animation-delay: 2s; font-size: 16px; }
    .floating-hearts span:nth-child(3) { left: 32%; animation-duration: 13s; animation-delay: 4s; }
    .floating-hearts span:nth-child(4) { left: 51%; animation-duration: 18s; animation-delay: 1s; font-size: 28px; }
    .floating-hearts span:nth-child(5) { left: 68%; animation-duration: 14s; animation-delay: 3s; }
    .floating-hearts span:nth-child(6) { left: 82%; animation-duration: 17s; animation-delay: 5s; font-size: 18px; }
    .floating-hearts span:nth-child(7) { left: 92%; animation-duration: 15s; animation-delay: 6s; }

    @keyframes floatHeart {
      0% {
        transform: translateY(0) rotate(0deg) scale(0.8);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg) scale(1.25);
        opacity: 0;
      }
    }

    /* ========================= */
    /* CONTAINER CENTRAL */
    /* ========================= */

    .container {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 760px;
      text-align: center;
      animation: appear 1.2s ease forwards;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(30px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .title-badge {
      display: inline-block;
      margin-bottom: 15px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(12px);
      color: #ffe8f1;
      font-size: 0.9rem;
      letter-spacing: 1px;
      box-shadow: 0 0 25px rgba(255, 160, 190, 0.25);
    }

    h1 {
      color: #fff;
      margin-bottom: 25px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1.1;
      text-shadow:
        0 0 10px rgba(255,255,255,0.7),
        0 0 25px rgba(214,51,108,0.8),
        0 0 45px rgba(255,215,0,0.35),
        2px 2px 10px rgba(0,0,0,0.7);
      animation: titleGlow 3s ease-in-out infinite alternate;
    }

    @keyframes titleGlow {
      from {
        filter: drop-shadow(0 0 6px rgba(255,255,255,0.35));
      }
      to {
        filter: drop-shadow(0 0 18px rgba(255,120,170,0.75));
      }
    }

    .parchment {
      position: relative;
      padding: 40px;
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.24), rgba(255,255,255,0.08)),
        rgba(244, 228, 188, 0.35);
      border: 1px solid rgba(255,255,255,0.35);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.45),
        inset 0 0 35px rgba(255,255,255,0.18),
        0 0 45px rgba(214,51,108,0.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      overflow: hidden;
    }

    .parchment::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(135deg, transparent, rgba(255,255,255,0.45), transparent);
      transform: translateX(-100%);
      animation: shine 5s infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% {
        transform: translateX(-120%) rotate(10deg);
      }
      35%, 100% {
        transform: translateX(120%) rotate(10deg);
      }
    }

    .parchment::after {
      content: "✦";
      position: absolute;
      top: 18px;
      right: 25px;
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.6rem;
      animation: sparkle 1.8s infinite alternate;
    }

    @keyframes sparkle {
      from {
        transform: scale(0.8) rotate(0deg);
        opacity: 0.4;
      }
      to {
        transform: scale(1.2) rotate(20deg);
        opacity: 1;
      }
    }

    .intro-text {
      color: #fff9ef;
      font-size: 1.1rem;
      line-height: 1.7;
      margin-bottom: 25px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
    }

    input {
      width: 100%;
      padding: 17px 18px;
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 18px;
      font-size: 1.05rem;
      text-align: center;
      color: #3d2b1f;
      background: rgba(255,255,255,0.78);
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.5),
        0 10px 25px rgba(0,0,0,0.18);
      margin-bottom: 25px;
      outline: none;
      transition: 0.35s ease;
    }

    input:focus {
      transform: scale(1.02);
      border-color: rgba(255, 215, 0, 0.9);
      box-shadow:
        0 0 0 4px rgba(255, 215, 0, 0.18),
        0 0 35px rgba(214,51,108,0.35);
    }

    input::placeholder {
      color: rgba(61, 43, 31, 0.6);
    }

    /* ========================= */
    /* BOUTON CARTE */
    /* ========================= */

    .card-btn {
      display: flex;
      justify-content: center;
      margin-top: 5px;
      cursor: pointer;
      perspective: 800px;
    }

    .mini-card {
      width: 95px;
      height: 130px;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.85), transparent 35%),
        linear-gradient(135deg, #fff2cc, #e8b65f, #b37a2b);
      border-radius: 18px;
      border: 3px solid rgba(255, 236, 180, 0.95);
      box-shadow:
        0 15px 35px rgba(0,0,0,0.35),
        0 0 35px rgba(255, 215, 0, 0.45),
        inset 0 0 20px rgba(255,255,255,0.35);
      display: flex;
      justify-content: center;
      align-items: center;
      transition: 0.45s ease;
      position: relative;
      transform-style: preserve-3d;
    }

    .mini-card::before {
      content: "";
      position: absolute;
      inset: 9px;
      border-radius: 13px;
      border: 1px solid rgba(255,255,255,0.65);
    }

    .mini-card::after {
      content: "Clique";
      position: absolute;
      bottom: 12px;
      font-size: 0.7rem;
      color: rgba(61,43,31,0.75);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-btn:hover .mini-card {
      transform: rotateY(18deg) rotateX(8deg) scale(1.08);
      box-shadow:
        0 22px 50px rgba(0,0,0,0.45),
        0 0 55px rgba(214,51,108,0.65);
    }

    .mini-heart {
      font-size: 2.3rem;
      color: #d6336c;
      animation: pulseHeart 1.3s infinite;
      text-shadow:
        0 0 12px rgba(214,51,108,0.7),
        0 0 25px rgba(255,255,255,0.8);
      z-index: 2;
    }

    @keyframes pulseHeart {
      0% { transform: scale(1); }
      50% { transform: scale(1.25); }
      100% { transform: scale(1); }
    }

    /* ========================= */
    /* RÉSULTATS */
    /* ========================= */

    #result {
      margin-top: 32px;
      min-height: 150px;
      color: #fffaf0;
      font-size: 1.12rem;
      line-height: 1.8;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      white-space: pre-line;
    }

    #result h2 {
      color: #fff;
      margin-bottom: 10px;
      text-shadow:
        0 0 12px rgba(255,255,255,0.55),
        0 0 25px rgba(214,51,108,0.6);
    }

    .result-img {
      max-width: 100%;
      border-radius: 22px;
      box-shadow:
        0 16px 40px rgba(0,0,0,0.38),
        0 0 35px rgba(255,215,0,0.25);
      border: 1px solid rgba(255,255,255,0.25);
    }

    iframe {
      width: 100%;
      max-width: 560px;
      height: 315px;
      border: none;
      border-radius: 22px;
      margin-top: 15px;
      box-shadow: 0 18px 45px rgba(0,0,0,0.4);
    }

    button {
      margin: 8px;
      padding: 13px 20px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.3);
      background: linear-gradient(135deg, #8b6f47, #d6336c);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.35s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow:
        0 14px 35px rgba(0,0,0,0.35),
        0 0 25px rgba(214,51,108,0.55);
    }

    .magic {
      animation: fadeIn 1.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .glow {
      text-shadow: 0 0 10px #fff, 0 0 20px #ffd700;
    }

    @media (max-width: 650px) {
      body {
        padding-top: 130px;
      }

      .navbar {
        top: 12px;
        border-radius: 24px;
        flex-wrap: wrap;
        gap: 6px;
        padding: 12px;
      }

      .navbar a {
        font-size: 0.82rem;
        padding: 8px 12px;
      }

      .parchment {
        padding: 28px 22px;
        border-radius: 26px;
      }

      iframe {
        height: 230px;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="index.html" class="active">Accueil</a>
    <a href="page1.html">Escape Game</a>
    <a href="page2.html">Souvenirs</a>
    <a href="page3.html">Quiz</a>
    <a href="page4.html">Surprise</a>
  </nav>

  <div class="floating-hearts">
    <span>❤</span>
    <span>♡</span>
    <span>❤</span>
    <span>♡</span>
    <span>❤</span>
    <span>♡</span>
    <span>❤</span>
  </div>

  <audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <div class="container">
    <div class="title-badge">✦ Message secret ✦</div>

    <h1>Petit mot pour mon ti cœur</h1>

    <div class="parchment">
      <p class="intro-text">
        Entre un code secret et laisse la magie faire le reste...
        <br>
        Chaque mot peut cacher une surprise rien que pour toi ❤️
      </p>

      <input
        type="text"
        id="codeInput"
        placeholder="Entre ton code secret..."
      />

      <div class="card-btn" onclick="checkCode()">
        <div class="mini-card">
          <div class="mini-heart">❤</div>
        </div>
      </div>

      <div id="result"></div>
    </div>
  </div>

  <script>
    const result = document.getElementById("result");

    function typeWriter(text, speed = 45) {
      result.innerHTML = "";
      let i = 0;

      function write() {
        if (i < text.length) {
          result.innerHTML += text.charAt(i);
          i++;
          setTimeout(write, speed);
        }
      }

      write();
    }

    function checkCode() {
      const code = document.getElementById("codeInput").value.trim().toLowerCase();

      if (code === "belle") {
        result.innerHTML = `
          <h2>Carte Lorcana - Belle Étrange</h2>
          <br>
          <img src="tichou1.png" alt="Carte Lorcana Belle" class="result-img">
        `;
      }

      else if (code === "poudlard") {
        startQuiz();
      }

      else if (code === "sexylove") {
        result.innerHTML = `
          <h2>Ne-Yo - Sexy Love</h2>
          <iframe
            src="https://www.youtube.com/embed/mgaeGW-2z6w"
            allowfullscreen>
          </iframe>
        `;
      }

      else if (code === "jack01") {
        result.innerHTML = `
          <h2>Une surprise pour toi ❤️</h2>

          <blockquote class="instagram-media" 
            data-instgrm-permalink="https://www.instagram.com/julieventurelli/reel/DXcHeetiA8P/" 
            data-instgrm-version="14"
            style="background:#FFF; border:0; margin: 20px auto; max-width:540px; width:100%;">
          </blockquote>
        `;

        setTimeout(() => {
          if (window.instgrm) {
            window.instgrm.Embeds.process();
          }
        }, 500);
      }

      else if (code === "moncoeur") {
        typeWriter(
          "Chaque jour avec toi ressemble à une page de plus dans la plus belle des histoires. Merci d'être toi, merci d'être là. Tu es mon plus beau hasard et mon plus doux refuge. ❤"
        );
      }

      else {
        result.innerHTML = "<p>Code inconnu... mais mon cœur reste ouvert pour toi ❤</p>";
      }
    }

    // 🧙‍♂️ QUIZ poudlard

    let score = { gryffondor:0, serpentard:0, serdaigle:0, poufsouffle:0 };
    let qIndex = 0;

    const questions = [
      {
        question:"1. Ce qui te définit ❤️",
        answers:[
          {text:"Je protège ceux que j'aime",house:"gryffondor"},
          {text:"Je veux toujours plus",house:"serpentard"},
          {text:"Je comprends tout",house:"serdaigle"},
          {text:"Je donne tout mon cœur",house:"poufsouffle"}
        ]
      },
      {
        question:"2. Dans notre histoire...",
        answers:[
          {text:"Tu es mon aventure",house:"gryffondor"},
          {text:"Tu es mon obsession",house:"serpentard"},
          {text:"Tu es mon évidence",house:"serdaigle"},
          {text:"Tu es mon refuge",house:"poufsouffle"}
        ]
      },
      {
        question:"3. Ton regard 💫",
        answers:[
          {text:"Déterminé",house:"gryffondor"},
          {text:"Intense",house:"serpentard"},
          {text:"Curieux",house:"serdaigle"},
          {text:"Doux",house:"poufsouffle"}
        ]
      },
      {
        question:"4. Notre relation 💖",
        answers:[
          {text:"Passionnée",house:"gryffondor"},
          {text:"Addictive",house:"serpentard"},
          {text:"Unique",house:"serdaigle"},
          {text:"Apaisante",house:"poufsouffle"}
        ]
      },
      {
        question:"5. Ce que tu es pour moi 🥺",
        answers:[
          {text:"Ma force",house:"gryffondor"},
          {text:"Mon désir",house:"serpentard"},
          {text:"Ma lumière",house:"serdaigle"},
          {text:"Mon refuge",house:"poufsouffle"}
        ]
      },
      {
        question:"6. Si je devais te décrire...",
        answers:[
          {text:"Incroyable",house:"gryffondor"},
          {text:"Irrésistible",house:"serpentard"},
          {text:"Brillante",house:"serdaigle"},
          {text:"Adorable",house:"poufsouffle"}
        ]
      },
      {
        question:"7. Notre futur 💍",
        answers:[
          {text:"Rempli d'aventures",house:"gryffondor"},
          {text:"Intense et passionné",house:"serpentard"},
          {text:"Profond et sincère",house:"serdaigle"},
          {text:"Doux et heureux",house:"poufsouffle"}
        ]
      },
      {
        question:"8. Ce que je ressens pour toi ❤",
        answers:[
          {text:"Un amour fort",house:"gryffondor"},
          {text:"Une attirance folle",house:"serpentard"},
          {text:"Une connexion unique",house:"serdaigle"},
          {text:"Un amour pur",house:"poufsouffle"}
        ]
      }
    ];

    function startQuiz(){
      score = { gryffondor:0, serpentard:0, serdaigle:0, poufsouffle:0 };
      qIndex = 0;
      typeWriter("Le Choixpeau magique s'éveille... 🧙‍♂️✨", 40);
      setTimeout(showQ, 2000);
    }

    function showQ(){
      const q = questions[qIndex];
      result.innerHTML = `<h2>${q.question}</h2>`;
      q.answers.forEach(a => {
        result.innerHTML += `<button onclick="answer('${a.house}')">${a.text}</button><br>`;
      });
    }

    function answer(h){
      score[h]++;
      qIndex++;

      if(qIndex < questions.length){
        showQ();
      } else {
        showResult();
      }
    }

    function showResult(){
      let house = Object.keys(score).reduce((a,b) => score[a] > score[b] ? a : b);

      let msg = "";

      if(house === "gryffondor")
        msg = "Gryffondor 🦁\n\nTu es passionnée, courageuse… et tu fais battre mon cœur plus fort chaque jour. Je suis fier de t’aimer ❤";

      if(house === "serpentard")
        msg = "Serpentard 🐍\n\nTu es magnétique… irrésistible… et complètement addictive. Je suis à toi 😏❤";

      if(house === "serdaigle")
        msg = "Serdaigle 🦅\n\nTon esprit me fascine… ton regard me perd… je tombe amoureux encore et encore ❤";

      if(house === "poufsouffle")
        msg = "Poufsouffle 🦡\n\nTu es douceur, chaleur… avec toi je suis chez moi. Tu es tout ❤";

      typeWriter("Le Choixpeau a parlé...\n\n" + msg, 35);
    }
  </script>

  <script async src="//www.instagram.com/embed.js"></script>

</body>
</html>
