<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petit mot pour mon ti cœur</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }
    body {
  min-height: 100vh;
  background: url('Background.jpg') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

body::before {
  content:"";
  position:absolute;
  inset:0;
  background: rgba(0,0,0,0.35);
  z-index:0;
}

.container {
  position: relative;
  z-index: 1;
}
    
.container {
  width: 100%;
  max-width: 700px;
  text-align: center;
}

h1 {
  color: #fff;
  margin-bottom: 20px;
  font-size: 2rem;
  text-shadow:
    0 0 10px rgba(255,255,255,0.6),
    2px 2px 8px rgba(0,0,0,0.6);
}

.parchment {
  background: #f4e4bc;
  border: 8px solid #c9a86a;
  border-radius: 20px;
  padding: 35px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.35);
  position: relative;
}

.parchment::before,
.parchment::after {
  content: "";
  position: absolute;
  width: 30px;
  height: 30px;
  background: rgba(255,255,255,0.2);
  border-radius: 50%;
}

.parchment::before {
  top: 10px;
  left: 10px;
}

.parchment::after {
  bottom: 10px;
  right: 10px;
}

input {
  width: 100%;
  padding: 14px;
  border: 2px solid #8b6f47;
  border-radius: 12px;
  font-size: 1rem;
  text-align: center;
  background: rgba(255,255,255,0.7);
  margin-bottom: 20px;
}

.heart-btn {
  background: #d6336c;
  color: white;
  border: none;
  width: 70px;
  height: 70px;
  font-size: 2rem;
  cursor: pointer;
  transform: rotate(-45deg);
  border-radius: 15px;
  position: relative;
  transition: 0.3s;
}

.heart-btn::before,
.heart-btn::after {
  content: "";
  position: absolute;
  width: 70px;
  height: 70px;
  background: #d6336c;
  border-radius: 50%;
}

.heart-btn::before {
  top: -35px;
  left: 0;
}

.heart-btn::after {
  left: 35px;
  top: 0;
}

.heart-btn span {
  position: relative;
  z-index: 2;
  display: inline-block;
  transform: rotate(45deg);
  font-size: 1.5rem;
  margin-top: 8px;
}

.heart-btn:hover {
  transform: rotate(-45deg) scale(1.08);
}

#result {
  margin-top: 30px;
  min-height: 150px;
  color: #3d2b1f;
  font-size: 1.1rem;
  line-height: 1.7;
}

.result-img {
  max-width: 100%;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.25);
}

iframe {
  width: 100%;
  max-width: 560px;
  height: 315px;
  border: none;
  border-radius: 14px;
  margin-top: 10px;
}

    .magic {
  animation: fadeIn 1.5s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

.glow {
  text-shadow: 0 0 10px #fff, 0 0 20px #ffd700;
}

button {
  margin: 8px;
  padding: 12px 18px;
  border-radius: 12px;
  border: none;
  background: #8b6f47;
  color: white;
  cursor: pointer;
  font-size: 1rem;
  transition: 0.3s;
}

button:hover {
  background: #a8885c;
  transform: scale(1.08);
}

/* 🃏 bouton carte */
.card-btn {
  display: flex;
  justify-content: center;
  margin-top: 15px;
  cursor: pointer;
}

.mini-card {
  width: 80px;
  height: 110px;
  background: linear-gradient(135deg, #f8e8c9, #e8cfa3);
  border-radius: 12px;
  border: 3px solid #c9a86a;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  display: flex;
  justify-content: center;
  align-items: center;
  transition: 0.3s;
  position: relative;
}

/* effet hover */
.mini-card:hover {
  transform: scale(1.08) rotate(2deg);
}

/* petit cœur au centre */
.mini-heart {
  font-size: 1.8rem;
  color: #d6336c;
  animation: pulseHeart 1.5s infinite;
}

@keyframes pulseHeart {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
    
  </style>
</head>
  <audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<body>
  <div class="container">

</div>

      result.innerHTML = "";
      let i = 0;

      function write() {
        if (i < text.length) {
          result.innerHTML += text.charAt(i);
          i++;
          setTimeout(write, speed);
        }
      }

      write();
    }

    function checkCode() {
      const code = document.getElementById("codeInput").value.trim().toLowerCase();

      if (code === "belle") {
        result.innerHTML = `
          <h2>Carte Lorcana - Belle Étrange</h2>
          <br>
          <img src="tichou1.png"de alt=Carte Lorcana Belle" class="result-img">
        `;
      }

else if (code === "poudlard") {
  startQuiz();
}
        
      else if (code === "sexylove") {
        result.innerHTML = `

          <iframe
            src="https://www.youtube.com/embed/mgaeGW-2z6w"
            allowfullscreen>
          </iframe>
        `;
      }

        typeWriter(
          "Chaque jour avec toi ressemble à une page de plus dans la plus belle des histoires. Merci d'être toi, merci d'être là. Tu es mon plus beau hasard et mon plus doux refuge. ❤"
        );
      }

      else {
        result.innerHTML = "<p>Code inconnu... mais mon cœur reste ouvert pour toi ❤</p>";
      }
    }
// 🧙‍♂️ QUIZ poudlard

let score = { gryffondor:0, serpentard:0, serdaigle:0, poufsouffle:0 };
let qIndex = 0;

const questions = [
{
question:"1. Ce qui te définit ❤️",
answers:[
{text:"Je protège ceux que j'aime",house:"gryffondor"},

]
},
{
question:"2. Dans notre histoire...",
answers:[

]
},
{

{text:"Curieux",house:"serdaigle"},

]

{

answers:[

{text:"Unique",house:"serdaigle"},
{text:"Apaisante",house:"poufsouffle"}
]
},
{

function startQuiz(){
  score = { gryffondor:0, serpentard:0, serdaigle:0, poufsouffle:0 };
  qIndex = 0;
  typeWriter("Le Choixpeau magique s'éveille... 🧙‍♂️✨",40);
  setTimeout(showQ,2000);
}

function showQ(){
  const q = questions[qIndex];
  result.innerHTML = `<h2>${q.question}</h2>`;
  q.answers.forEach(a=>{
    result.innerHTML += `<button onclick="answer('${a.house}')">${a.text}</button><br><br>`;
  });
}

function answer(h){
  score[h]++;
  qIndex++;
  if(qIndex < questions.length){
    showQ();
  } else {
    showResult();
  }
}

function showResult(){
  let house = Object.keys(score).reduce((a,b)=> score[a]>score[b]?a:b);

  let msg="";

  if(house==="gryffondor")
    msg="Gryffondor 🦁\n\nTu es passionnée, courageuse… et tu fais battre mon cœur plus fort chaque jour. Je suis fier de t’aimer ❤";

  if(house==="serpentard")
    msg="Serpentard 🐍\n\nTu es magnétique… irrésistible… et complètement addictive. Je suis à toi 😏❤";

  if(house==="serdaigle")
    msg="Serdaigle 🦅\n\nTon esprit me fascine… ton regard me perd… je tombe amoureux encore et encore ❤";

  if(house==="poufsouffle")
    msg="Poufsouffle 🦡\n\nTu es douceur, chaleur… avec toi je suis chez moi. Tu es tout ❤";

  typeWriter("Le Choixpeau a parlé...\n\n" + msg,35);
}
    
  </script></body>
</html>
