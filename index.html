<!DOCTYPE html><html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Petit mot pour mon ti cœur</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }
   /* 🌌 fond plus immersif */
body {
  background: url('Background.jpg') center/cover no-repeat fixed;
  position: relative;
}

/* 🌫️ effet sombre magique */
body::before {
  content:"";
  position:absolute;
  inset:0;
  background: radial-gradient(circle at top, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
  z-index:0;
}

/* 📦 container au-dessus */
.container {
  position: relative;
  z-index: 2;
}

/* 📜 PARCHEMIN ULTRA AMÉLIORÉ */
.parchment {
  background: linear-gradient(135deg, #f8e8c9, #f1d9a6);
  border: 3px solid rgba(139,111,71,0.8);
  border-radius: 25px;
  padding: 45px 30px;

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 25px rgba(255,255,255,0.4);

  position: relative;
  overflow: hidden;

  animation: float 6s ease-in-out infinite;
}

/* texture parchemin */
.parchment::before {
  content:"";
  position:absolute;
  inset:0;
  background: url('https://www.transparenttextures.com/patterns/parchment.png');
  opacity:0.25;
}

/* animation flottante */
@keyframes float {
  0%,100% { transform: translateY(0px); }
  50% { transform: translateY(-6px); }
}

/* 💖 bouton coeur glow */
.heart-btn {
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  animation: pulse 1.8s infinite;
}

@keyframes pulse {
  0% { transform: rotate(-45deg) scale(1); }
  50% { transform: rotate(-45deg) scale(1.1); }
  100% { transform: rotate(-45deg) scale(1); }
}

/* ✨ input glow */
input:focus {
  border-color: gold;
  box-shadow: 0 0 15px rgba(255,215,0,0.6);
}  
  </style>
</head>
  <audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>
<body>
  <div class="container">
    <h1>Petit mot pour mon ti cœur</h1><div class="parchment">
  <input
    type="text"
    id="codeInput"
    placeholder="Entre ton code secret..."
  />

  <button class="heart-btn" onclick="checkCode()">
    <span>❤</span>
  </button>

  <div id="result"></div>
</div>

  </div>  <script>
    const result = document.getElementById("result");

    function typeWriter(text, speed = 45) {
      result.innerHTML = "";
      let i = 0;

      function write() {
        if (i < text.length) {
          result.innerHTML += text.charAt(i);
          i++;
          setTimeout(write, speed);
        }
      }

      write();
    }

    function checkCode() {
      const code = document.getElementById("codeInput").value.trim().toLowerCase();

      if (code === "belle") {
        result.innerHTML = `
          <h2>Carte Lorcana - Belle Étrange</h2>
          <br>
          <img src="tichou1.png"de alt=Carte Lorcana Belle" class="result-img">
        `;
      }

else if (code === "poudlard") {
  startQuiz();
}
        
      else if (code === "sexylove") {
        result.innerHTML = `
          <h2>Ne-Yo - Sexy Love</h2>
          <iframe
            src="https://www.youtube.com/embed/mgaeGW-2z6w"
            allowfullscreen>
          </iframe>
        `;
      }

      else if (code === "moncoeur") {
        typeWriter(
          "Chaque jour avec toi ressemble à une page de plus dans la plus belle des histoires. Merci d'être toi, merci d'être là. Tu es mon plus beau hasard et mon plus doux refuge. ❤"
        );
      }

      else {
        result.innerHTML = "<p>Code inconnu... mais mon cœur reste ouvert pour toi ❤</p>";
      }
    }
// 🧙‍♂️ QUIZ POUDLARD

let score = { gryffondor:0, serpentard:0, serdaigle:0, poufsouffle:0 };
let qIndex = 0;

const questions = [
{
question:"1. Ce qui te définit ❤️",
answers:[
{text:"Je protège ceux que j'aime",house:"gryffondor"},
{text:"Je veux toujours plus",house:"serpentard"},
{text:"Je comprends tout",house:"serdaigle"},
{text:"Je donne tout mon cœur",house:"poufsouffle"}
]
},
{
question:"2. Dans notre histoire...",
answers:[
{text:"Tu es mon aventure",house:"gryffondor"},
{text:"Tu es mon obsession",house:"serpentard"},
{text:"Tu es mon évidence",house:"serdaigle"},
{text:"Tu es mon refuge",house:"poufsouffle"}
]
},
{
question:"3. Ton pouvoir 💫",
answers:[
{text:"Courage",house:"gryffondor"},
{text:"Ambition",house:"serpentard"},
{text:"Intelligence",house:"serdaigle"},
{text:"Douceur",house:"poufsouffle"}
]
},
{
question:"4. Pour moi tu es...",
answers:[
{text:"Ma force",house:"gryffondor"},
{text:"Mon désir",house:"serpentard"},
{text:"Ma lumière",house:"serdaigle"},
{text:"Mon amour",house:"poufsouffle"}
]
},
{
question:"5. Notre futur 💍",
answers:[
{text:"Aventureux",house:"gryffondor"},
{text:"Passionné",house:"serpentard"},
{text:"Profond",house:"serdaigle"},
{text:"Doux",house:"poufsouffle"}
]
}
];

function startQuiz(){
  score = { gryffondor:0, serpentard:0, serdaigle:0, poufsouffle:0 };
  qIndex = 0;
  typeWriter("Le Choixpeau magique s'éveille... 🧙‍♂️✨",40);
  setTimeout(showQ,2000);
}

function showQ(){
  const q = questions[qIndex];
  result.innerHTML = `<h2>${q.question}</h2>`;
  q.answers.forEach(a=>{
    result.innerHTML += `<button onclick="answer('${a.house}')">${a.text}</button><br><br>`;
  });
}

function answer(h){
  score[h]++;
  qIndex++;
  if(qIndex < questions.length){
    showQ();
  } else {
    showResult();
  }
}

function showResult(){
  let house = Object.keys(score).reduce((a,b)=> score[a]>score[b]?a:b);

  let msg="";
  if(house==="gryffondor") msg="Gryffondor 🦁\n\nTu es mon courage, ma force… et mon plus bel amour ❤";
  if(house==="serpentard") msg="Serpentard 🐍\n\nTu es irrésistible… et complètement à moi 😏❤";
  if(house==="serdaigle") msg="Serdaigle 🦅\n\nTon esprit me fait tomber amoureux chaque jour ❤";
  if(house==="poufsouffle") msg="Poufsouffle 🦡\n\nTu es mon refuge… mon cœur est chez toi ❤";

  typeWriter("Le Choixpeau a parlé...\n\n" + msg,35);
}
    
  </script></body>
</html>
