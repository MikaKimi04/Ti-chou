<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escape Game des Sortilèges</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Georgia", serif;
    }

    body {
      min-height: 100vh;
      background: url('Background.jpg') center/cover no-repeat fixed;
      color: white;
      overflow-x: hidden;
      position: relative;
      padding: 110px 20px 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at top left, rgba(126, 87, 194, 0.45), transparent 35%),
        radial-gradient(circle at bottom right, rgba(255, 215, 0, 0.22), transparent 35%),
        rgba(0, 0, 0, 0.65);
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      opacity: 0.25;
      z-index: 0;
      pointer-events: none;
    }

    /* NAVBAR */

    .navbar {
      position: fixed;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: calc(100% - 40px);
      max-width: 1050px;
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(15, 8, 30, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.22);
      backdrop-filter: blur(18px);
      box-shadow:
        0 20px 45px rgba(0, 0, 0, 0.45),
        inset 0 0 25px rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      z-index: 1000;
    }

    .navbar a {
      color: #fff7fb;
      text-decoration: none;
      font-size: 0.95rem;
      letter-spacing: 0.5px;
      padding: 10px 18px;
      border-radius: 999px;
      position: relative;
      overflow: hidden;
      transition: 0.35s ease;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.35);
    }

    .navbar a:hover,
    .navbar a.active {
      background: linear-gradient(135deg, #6f42c1, #d6336c);
      box-shadow: 0 0 25px rgba(126, 87, 194, 0.8);
      transform: translateY(-3px);
    }

    /* ÉTOILES / PARTICULES */

    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }

    .stars span {
      position: absolute;
      bottom: -60px;
      color: rgba(255, 235, 160, 0.8);
      animation: rise linear infinite;
      text-shadow: 0 0 12px rgba(255, 215, 0, 0.9);
    }

    .stars span:nth-child(1) { left: 8%; animation-duration: 11s; animation-delay: 0s; font-size: 20px; }
    .stars span:nth-child(2) { left: 20%; animation-duration: 15s; animation-delay: 2s; font-size: 14px; }
    .stars span:nth-child(3) { left: 35%; animation-duration: 13s; animation-delay: 4s; font-size: 24px; }
    .stars span:nth-child(4) { left: 50%; animation-duration: 18s; animation-delay: 1s; font-size: 16px; }
    .stars span:nth-child(5) { left: 65%; animation-duration: 12s; animation-delay: 3s; font-size: 22px; }
    .stars span:nth-child(6) { left: 78%; animation-duration: 16s; animation-delay: 5s; font-size: 15px; }
    .stars span:nth-child(7) { left: 90%; animation-duration: 14s; animation-delay: 6s; font-size: 26px; }

    @keyframes rise {
      0% {
        transform: translateY(0) rotate(0deg);
        opacity: 0;
      }
      10% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) rotate(360deg);
        opacity: 0;
      }
    }

    /* CONTAINER */

    .game-wrapper {
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 850px;
      text-align: center;
      animation: appear 1.1s ease forwards;
    }

    @keyframes appear {
      from {
        opacity: 0;
        transform: translateY(35px) scale(0.96);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .badge {
      display: inline-block;
      margin-bottom: 14px;
      padding: 8px 18px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.25);
      color: #ffeab0;
      backdrop-filter: blur(12px);
      letter-spacing: 1px;
      box-shadow: 0 0 25px rgba(255, 215, 0, 0.25);
    }

    h1 {
      font-size: clamp(2.2rem, 5vw, 4.2rem);
      margin-bottom: 25px;
      text-shadow:
        0 0 10px rgba(255,255,255,0.7),
        0 0 25px rgba(126,87,194,0.85),
        0 0 45px rgba(255,215,0,0.3);
      animation: glowTitle 3s ease-in-out infinite alternate;
    }

    @keyframes glowTitle {
      from {
        filter: drop-shadow(0 0 5px rgba(255,255,255,0.35));
      }
      to {
        filter: drop-shadow(0 0 22px rgba(255,215,0,0.65));
      }
    }

    .spell-card {
      position: relative;
      padding: 42px;
      border-radius: 34px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.06)),
        rgba(22, 12, 45, 0.55);
      border: 1px solid rgba(255,255,255,0.28);
      box-shadow:
        0 30px 90px rgba(0,0,0,0.55),
        inset 0 0 40px rgba(255,255,255,0.10),
        0 0 50px rgba(126,87,194,0.35);
      backdrop-filter: blur(18px);
      overflow: hidden;
      min-height: 470px;
    }

    .spell-card::before {
      content: "";
      position: absolute;
      inset: -2px;
      background: linear-gradient(120deg, transparent, rgba(255, 235, 180, 0.45), transparent);
      transform: translateX(-120%) rotate(8deg);
      animation: shine 5s infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0% { transform: translateX(-120%) rotate(8deg); }
      35%, 100% { transform: translateX(120%) rotate(8deg); }
    }

    .step {
      animation: fadeIn 0.8s ease;
      position: relative;
      z-index: 2;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(18px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .rune-circle {
      width: 170px;
      height: 170px;
      margin: 0 auto 25px;
      border-radius: 50%;
      border: 2px solid rgba(255, 215, 0, 0.65);
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      box-shadow:
        0 0 30px rgba(255,215,0,0.35),
        inset 0 0 25px rgba(126,87,194,0.45);
      animation: rotateCircle 10s linear infinite;
    }

    .rune-circle::before,
    .rune-circle::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 1px dashed rgba(255,255,255,0.35);
    }

    .rune-circle::before {
      inset: 15px;
    }

    .rune-circle::after {
      inset: 35px;
    }

    @keyframes rotateCircle {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .rune-symbol {
      font-size: 4rem;
      color: #ffeab0;
      text-shadow:
        0 0 12px rgba(255,255,255,0.8),
        0 0 25px rgba(255,215,0,0.7);
      animation: counterRotate 10s linear infinite;
    }

    @keyframes counterRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    h2 {
      font-size: 2rem;
      margin-bottom: 18px;
      color: #fff6cf;
      text-shadow: 0 0 18px rgba(255,215,0,0.35);
    }

    p {
      font-size: 1.1rem;
      line-height: 1.8;
      color: #fff7ef;
      text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      margin-bottom: 20px;
    }

    .enigme {
      margin: 25px auto;
      padding: 22px;
      max-width: 650px;
      border-radius: 22px;
      background: rgba(0, 0, 0, 0.28);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 0 25px rgba(255,255,255,0.06);
      color: #ffeab0;
      font-size: 1.15rem;
      line-height: 1.9;
    }

    input {
      width: 100%;
      max-width: 420px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.45);
      text-align: center;
      font-size: 1.05rem;
      background: rgba(255,255,255,0.85);
      color: #2a163f;
      outline: none;
      box-shadow:
        inset 0 0 18px rgba(255,255,255,0.5),
        0 10px 25px rgba(0,0,0,0.25);
      transition: 0.35s ease;
      margin-bottom: 14px;
    }

    input:focus {
      transform: scale(1.03);
      border-color: rgba(255, 215, 0, 0.95);
      box-shadow:
        0 0 0 4px rgba(255,215,0,0.15),
        0 0 35px rgba(255,215,0,0.3);
    }

    button {
      margin: 8px;
      padding: 14px 22px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.32);
      background: linear-gradient(135deg, #6f42c1, #d6336c);
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.35s ease;
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
    }

    button:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow:
        0 18px 38px rgba(0,0,0,0.45),
        0 0 30px rgba(214,51,108,0.6);
    }

    .hint-btn {
      background: linear-gradient(135deg, #8b6f47, #c9a86a);
    }

    .hint {
      display: none;
      margin: 18px auto 0;
      max-width: 550px;
      padding: 15px;
      border-radius: 18px;
      background: rgba(255, 215, 0, 0.14);
      border: 1px solid rgba(255, 215, 0, 0.32);
      color: #fff2bd;
      animation: fadeIn 0.5s ease;
    }

    .wrong {
      color: #ffb3c7;
      min-height: 28px;
      margin-top: 10px;
      font-weight: bold;
    }

    .inventory {
      margin: 0 auto 22px;
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .item {
      padding: 9px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      color: #ffeab0;
      font-size: 0.9rem;
      box-shadow: 0 0 16px rgba(255,215,0,0.12);
    }

    .locked {
      opacity: 0.35;
      filter: grayscale(1);
    }

    .choice-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      max-width: 650px;
      margin: 25px auto 0;
    }

    .choice {
      padding: 20px;
      border-radius: 22px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.22);
      cursor: pointer;
      transition: 0.35s ease;
      min-height: 100px;
    }

    .choice:hover {
      transform: translateY(-5px);
      background: rgba(255,255,255,0.2);
      box-shadow: 0 0 28px rgba(255,215,0,0.25);
    }

    .door {
      width: 190px;
      height: 270px;
      margin: 10px auto 25px;
      border-radius: 90px 90px 18px 18px;
      background:
        radial-gradient(circle at 70% 50%, #ffeab0 0 5px, transparent 6px),
        linear-gradient(90deg, rgba(255,255,255,0.12), transparent 35%),
        linear-gradient(135deg, #3b1e5c, #16091f);
      border: 3px solid rgba(255, 215, 0, 0.55);
      box-shadow:
        0 0 35px rgba(126,87,194,0.65),
        inset 0 0 30px rgba(255,215,0,0.18);
      position: relative;
      animation: doorPulse 2s infinite alternate;
    }

    @keyframes doorPulse {
      from {
        box-shadow:
          0 0 25px rgba(126,87,194,0.45),
          inset 0 0 25px rgba(255,215,0,0.13);
      }
      to {
        box-shadow:
          0 0 55px rgba(255,215,0,0.5),
          inset 0 0 38px rgba(255,215,0,0.22);
      }
    }

    .door::before {
      content: "✦";
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 3rem;
      color: #ffeab0;
      text-shadow: 0 0 20px rgba(255,215,0,0.8);
    }

    .final-heart {
      font-size: 5rem;
      animation: heartBoom 1.5s infinite;
      text-shadow:
        0 0 20px rgba(214,51,108,0.9),
        0 0 45px rgba(255,255,255,0.6);
    }

    @keyframes heartBoom {
      0% { transform: scale(1); }
      50% { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    @media (max-width: 650px) {
      body {
        padding-top: 135px;
      }

      .navbar {
        border-radius: 24px;
        flex-wrap: wrap;
        gap: 6px;
      }

      .navbar a {
        font-size: 0.82rem;
        padding: 8px 12px;
      }

      .spell-card {
        padding: 28px 20px;
      }

      .choice-grid {
        grid-template-columns: 1fr;
      }

      .rune-circle {
        width: 135px;
        height: 135px;
      }

      .rune-symbol {
        font-size: 3rem;
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <a href="index.html">Accueil</a>
    <a href="page1.html" class="active">Escape Game</a>
    <a href="page2.html">Souvenirs</a>
    <a href="page3.html">Quiz</a>
    <a href="page4.html">Surprise</a>
  </nav>

  <div class="stars">
    <span>✦</span>
    <span>✧</span>
    <span>✦</span>
    <span>✧</span>
    <span>✦</span>
    <span>✧</span>
    <span>✦</span>
  </div>

  <div class="game-wrapper">
    <div class="badge">✦ Chambre des Sortilèges ✦</div>
    <h1>Le Grimoire du Cœur</h1>

    <div class="spell-card">
      <div class="inventory" id="inventory">
        <span class="item locked" id="item1">Rune du Souvenir</span>
        <span class="item locked" id="item2">Flamme Dorée</span>
        <span class="item locked" id="item3">Clé du Cœur</span>
      </div>

      <div id="game"></div>
    </div>
  </div>

  <script>
    let step = 0;
    let tries = 0;

    const game = document.getElementById("game");

    function render() {
      tries = 0;

      if (step === 0) {
        game.innerHTML = `
          <div class="step">
            <div class="rune-circle">
              <div class="rune-symbol">☽</div>
            </div>

            <h2>La porte vient de se refermer...</h2>

            <p>
              Une voix ancienne murmure entre les murs :
              <br>
              “Seul un cœur attentif pourra ouvrir le grimoire.”
            </p>

            <div class="enigme">
              Trois fragments magiques sont cachés ici :
              <br>
              une rune, une flamme et une clé.
              <br><br>
              Trouve-les, et la porte du cœur s’ouvrira.
            </div>

            <button onclick="nextStep()">Toucher le grimoire</button>
          </div>
        `;
      }

      if (step === 1) {
        game.innerHTML = `
          <div class="step">
            <div class="rune-circle">
              <div class="rune-symbol">ᚱ</div>
            </div>

            <h2>Épreuve 1 : La Rune du Souvenir</h2>

            <p>
              Sur la première page, une phrase apparaît en lettres dorées.
            </p>

            <div class="enigme">
              Je peux être douce ou douloureuse,
              <br>
              je vis dans la tête mais je réchauffe le cœur.
              <br>
              Plus le temps passe, plus je deviens précieuse.
              <br><br>
              Qui suis-je ?
            </div>

            <input id="answer1" placeholder="Écris ta réponse..." />
            <br>
            <button onclick="checkStep1()">Valider</button>
            <button class="hint-btn" onclick="showHint('hint1')">Indice</button>

            <div class="hint" id="hint1">
              Indice : on en garde des beaux avec les personnes qu’on aime.
            </div>

            <div class="wrong" id="wrong1"></div>
          </div>
        `;
      }

      if (step === 2) {
        game.innerHTML = `
          <div class="step">
            <div class="rune-circle">
              <div class="rune-symbol">♨</div>
            </div>

            <h2>Épreuve 2 : La Potion de Vérité</h2>

            <p>
              Un chaudron se met à bouillonner.
              Pour obtenir la flamme dorée, il faut choisir les bons ingrédients.
            </p>

            <div class="enigme">
              La formule dit :
              <br><br>
              “Pour révéler ce qui compte vraiment,
              choisis ce qui rend un amour plus fort.”
            </div>

            <div class="choice-grid">
              <div class="choice" onclick="badChoice()">Jalousie</div>
              <div class="choice" onclick="goodChoice()">Confiance</div>
              <div class="choice" onclick="goodChoice()">Tendresse</div>
              <div class="choice" onclick="badChoice()">Orgueil</div>
            </div>

            <div class="wrong" id="wrong2"></div>
          </div>
        `;
      }

      if (step === 3) {
        game.innerHTML = `
          <div class="step">
            <div class="rune-circle">
              <div class="rune-symbol">✶</div>
            </div>

            <h2>Épreuve 3 : Le Mot Interdit</h2>

            <p>
              La dernière page du grimoire est fermée par un sort ancien.
              Une seule formule peut la déverrouiller.
            </p>

            <div class="enigme">
              Je ne suis pas un objet.
              <br>
              Je ne suis pas un lieu.
              <br>
              Je peux faire trembler, sourire, pleurer,
              <br>
              et pourtant je tiens souvent en deux mots.
              <br><br>
              Quelle est la formule ?
            </div>

            <input id="answer3" placeholder="Écris la formule..." />
            <br>
            <button onclick="checkStep3()">Lancer le sort</button>
            <button class="hint-btn" onclick="showHint('hint3')">Indice</button>

            <div class="hint" id="hint3">
              Indice : c’est quelque chose qu’on dit quand le cœur déborde.
            </div>

            <div class="wrong" id="wrong3"></div>
          </div>
        `;
      }

      if (step === 4) {
        game.innerHTML = `
          <div class="step">
            <div class="door"></div>

            <h2>La Porte du Cœur</h2>

            <p>
              Les trois fragments brillent autour de toi.
              La serrure attend le dernier code.
            </p>

            <div class="enigme">
              Assemble les trois réponses magiques :
              <br><br>
              <strong>souvenir + confiance + amour</strong>
              <br><br>
              Écris le code final en un seul mot.
            </div>

            <input id="finalCode" placeholder="Code final..." />
            <br>
            <button onclick="checkFinal()">Ouvrir la porte</button>
            <button class="hint-btn" onclick="showHint('hintFinal')">Indice</button>

            <div class="hint" id="hintFinal">
              Indice : le code est simplement <strong>amour</strong>.
            </div>

            <div class="wrong" id="wrongFinal"></div>
          </div>
        `;
      }

      if (step === 5) {
        game.innerHTML = `
          <div class="step">
            <div class="final-heart">❤</div>

            <h2>La porte s’ouvre...</h2>

            <p>
              Une lumière douce envahit la pièce.
              Le grimoire révèle enfin son dernier secret.
            </p>

            <div class="enigme">
              Si tu as réussi ces épreuves,
              c’est parce que tu as suivi les bons indices :
              <br><br>
              le souvenir, la confiance, la tendresse et l’amour.
              <br><br>
              Et c’est exactement ce que je veux garder avec toi :
              une histoire magique, vraie, douce,
              et pleine de petits moments rien qu’à nous.
              <br><br>
              <strong>Tu es mon plus beau sortilège. ❤️</strong>
            </div>

            <button onclick="restart()">Rejouer</button>
            <a href="index.html"><button>Retour à l’accueil</button></a>
          </div>
        `;

        launchMagicBurst();
      }
    }

    function nextStep() {
      step++;
      render();
    }

    function normalize(text) {
      return text
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function checkStep1() {
      const value = normalize(document.getElementById("answer1").value);
      const wrong = document.getElementById("wrong1");

      if (
        value.includes("souvenir") ||
        value.includes("memoire") ||
        value.includes("un souvenir")
      ) {
        document.getElementById("item1").classList.remove("locked");
        document.getElementById("item1").textContent = "✓ Rune du Souvenir";
        step = 2;
        render();
      } else {
        tries++;
        wrong.textContent = tries >= 2
          ? "Le grimoire souffle : pense à quelque chose qu’on garde dans le cœur..."
          : "La rune reste sombre... ce n’est pas encore ça.";
      }
    }

    let goodChoices = 0;

    function goodChoice() {
      goodChoices++;

      if (goodChoices >= 2) {
        document.getElementById("item2").classList.remove("locked");
        document.getElementById("item2").textContent = "✓ Flamme Dorée";
        step = 3;
        goodChoices = 0;
        render();
      } else {
        document.getElementById("wrong2").textContent = "Le chaudron brille... encore un bon ingrédient.";
      }
    }

    function badChoice() {
      document.getElementById("wrong2").textContent = "Le chaudron gronde... cet ingrédient affaiblit le sort.";
    }

    function checkStep3() {
      const value = normalize(document.getElementById("answer3").value);
      const wrong = document.getElementById("wrong3");

      if (
        value.includes("je t aime") ||
        value.includes("je taime") ||
        value.includes("amour")
      ) {
        document.getElementById("item3").classList.remove("locked");
        document.getElementById("item3").textContent = "✓ Clé du Cœur";
        step = 4;
        render();
      } else {
        tries++;
        wrong.textContent = tries >= 2
          ? "La page tremble : la formule commence souvent par “je...”"
          : "Le sort ne fonctionne pas encore...";
      }
    }

    function checkFinal() {
      const value = normalize(document.getElementById("finalCode").value);
      const wrong = document.getElementById("wrongFinal");

      if (value === "amour") {
        step = 5;
        render();
      } else {
        wrong.textContent = "La serrure magique résiste encore...";
      }
    }

    function showHint(id) {
      const hint = document.getElementById(id);
      hint.style.display = "block";
    }

    function restart() {
      step = 0;
      tries = 0;
      goodChoices = 0;

      document.getElementById("item1").classList.add("locked");
      document.getElementById("item2").classList.add("locked");
      document.getElementById("item3").classList.add("locked");

      document.getElementById("item1").textContent = "Rune du Souvenir";
      document.getElementById("item2").textContent = "Flamme Dorée";
      document.getElementById("item3").textContent = "Clé du Cœur";

      render();
    }

    function launchMagicBurst() {
      for (let i = 0; i < 25; i++) {
        const spark = document.createElement("div");
        spark.textContent = i % 2 === 0 ? "✦" : "❤";
        spark.style.position = "fixed";
        spark.style.left = "50%";
        spark.style.top = "50%";
        spark.style.zIndex = "9999";
        spark.style.pointerEvents = "none";
        spark.style.color = i % 2 === 0 ? "#ffeab0" : "#ff8fab";
        spark.style.fontSize = Math.random() * 18 + 14 + "px";
        spark.style.textShadow = "0 0 15px rgba(255,255,255,0.9)";

        const angle = Math.random() * Math.PI * 2;
        const distance = Math.random() * 260 + 80;
        const x = Math.cos(angle) * distance;
        const y = Math.sin(angle) * distance;

        spark.animate([
          {
            transform: "translate(-50%, -50%) scale(0.4)",
            opacity: 1
          },
          {
            transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(1.4)`,
            opacity: 0
          }
        ], {
          duration: 1400 + Math.random() * 700,
          easing: "ease-out"
        });

        document.body.appendChild(spark);

        setTimeout(() => {
          spark.remove();
        }, 2200);
      }
    }

    render();
  </script>

</body>
</html>
